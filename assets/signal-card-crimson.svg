    <path d="M819.5 97.5L860.5 117.5" stroke="#FF5A74" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
    <path d="M860.5 97.5L819.5 117.5" stroke="#FF5A74" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
