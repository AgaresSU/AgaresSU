      .muted { fill: #C26A78; font-size: 22px; font-weight: 500; }
      .small { fill: #F198A6; font-size: 18px; font-weight: 600; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect x="1" y="1" width="918" height="258" rx="18" fill="url(#cardBg)" stroke="#2E1218" stroke-width="2"/>
  <rect x="1" y="1" width="918" height="42" rx="18" fill="url(#barBg)"/>
  <rect x="1" y="25" width="918" height="18" fill="url(#barBg)"/>

