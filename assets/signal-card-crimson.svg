<svg width="920" height="260" viewBox="0 0 920 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="920" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0D"/>
      <stop offset="1" stop-color="#101116"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse">
